[webrtc-template](!)
type=endpoint
transport=transport-wss
context=axion-voice-internal
disallow=all
allow=opus,ulaw,alaw
webrtc=yes
use_avpf=yes
media_encryption=dtls
dtls_auto_generate_cert=yes
ice_support=yes
rtcp_mux=yes
media_use_received_transport=yes
rewrite_contact=yes
force_rport=yes
rtp_symmetric=yes
direct_media=no
identify_by=auth_username

[1001-webrtc](webrtc-template)
auth=1001-webrtc-auth
aors=1001-webrtc
callerid=Axion Browser 1001 <1001-webrtc>

[1001-webrtc-auth]
type=auth
auth_type=userpass
username=1001-webrtc
password=1001@Axion
realm=asterisk

[1001-webrtc]
type=aor
max_contacts=5
remove_existing=yes
support_path=yes

